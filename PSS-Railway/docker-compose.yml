version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pss}
      POSTGRES_DB: ${POSTGRES_DB:-pss}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro

  backend:
    build: ./backend
    depends_on:
      - db
    env_file: [.env]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pss:pss@db:5432/pss}
      APP_PORT: "8000"
    ports:
      - "8000:8000"

  n8n:
    image: n8nio/n8n:1.72.1
    depends_on: [db]
    env_file: [.env, ./n8n/env.example]  # you can copy .env → n8n/.env later
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-pss}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-pss}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-pss}

  interface:
    build: ./interface
    depends_on: [backend]
    env_file: [.env]
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      STREAMLIT_PORT: "8501"
    ports:
      - "8501:8501"

volumes:
  db_data:
  n8n_data: